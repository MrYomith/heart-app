[build]
  command = "npm run build"
  publish = "dist"

# Same-origin API base so the proxy redirects below handle backend calls.
[build.environment]
  VITE_API_BASE = ""

# Proxy API calls to the EC2 backend server-side, so the HTTPS Netlify site can
# reach the HTTP backend without mixed-content errors. The dashboard calls
# same-origin /auth and /api (VITE_API_BASE='') and Netlify forwards them.
[[redirects]]
  from = "/auth/*"
  to = "http://ec2-3-86-212-253.compute-1.amazonaws.com/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "http://ec2-3-86-212-253.compute-1.amazonaws.com/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
